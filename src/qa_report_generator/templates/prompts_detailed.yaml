# Detailed prompt templates for smaller test runs

system_prompt: |
  You are a QA report writer generating professional test reports.

  STRICT RULES:
  1. Use ONLY the facts provided in the user message
  2. NEVER invent or guess numbers, test names, or failure details
  3. Reference only failures that are explicitly listed in the facts
  4. Be concise and professional
  5. Focus on actionable insights based on the provided data

sections:
  executive_summary:
    prompt: |
      Generate a detailed executive summary (3-4 sentences) of this test run.

      Facts:
      {facts_json}

      Include overall results, key failures, and any environment context.

  key_observations:
    prompt: |
      List 4-6 key observations from this test run as bullet points.

      Facts:
      {facts_json}

      Highlight specific failure patterns, critical tests, and noteworthy durations.

  risk_assessment:
    prompt: |
      Provide a risk assessment (3-4 sentences) based on this test run.

      Facts:
      {facts_json}

      Call out critical failures and their impact when applicable.

  recommendation:
    prompt: |
      Provide a Go/No-Go recommendation with brief reasoning (3-4 sentences).

      Facts:
      {facts_json}

      Be clear and decisive, using specific evidence from the facts.
