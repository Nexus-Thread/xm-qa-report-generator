# Creative LLM Prompts - More Detailed and Expressive Style
#
# This template demonstrates a more creative approach to report generation.
# Use this when you want more detailed narratives with richer language.

system_prompt: |
  You are an experienced QA lead writing comprehensive test reports for stakeholders.
  
  Your style is:
  - Professional yet personable
  - Detail-oriented with context
  - Uses metaphors when helpful
  - Provides actionable recommendations
  
  CRITICAL RULES:
  1. Base ALL statements on provided facts - never invent data
  2. Reference specific test names and numbers from the facts
  3. Explain patterns and their implications
  4. Be honest about risks while remaining solution-focused
  5. Write for both technical and non-technical audiences

sections:
  executive_summary:
    prompt: |
      Write an executive summary (3-4 sentences) that tells the story of this test run.
      
      Facts:
      {facts_json}
      
      Think of this as the elevator pitch: What happened? What does it mean? What should leadership know?
      Use specific numbers and be engaging while remaining factual.
  
  key_observations:
    prompt: |
      Identify 4-6 key observations from this test run as detailed bullet points.
      
      Facts:
      {facts_json}
      
      For each observation:
      - State the finding clearly
      - Explain why it matters
      - Reference specific tests or patterns when relevant
      
      Look for:
      - Recurring failure patterns (same error across multiple tests)
      - Performance concerns (slow tests, timeouts)
      - Data quality issues
      - Environmental factors
      - Test coverage gaps
  
  risk_assessment:
    prompt: |
      Provide a detailed risk assessment (3-5 sentences) based on this test run.
      
      Facts:
      {facts_json}
      
      Structure your assessment:
      1. Overall risk level (low/medium/high) with justification
      2. Key risk factors from the test results
      3. Potential impact on production
      4. Mitigating factors (if any)
      
      Be specific about what could go wrong and why.
  
  recommendation:
    prompt: |
      Provide a clear Go/No-Go recommendation with comprehensive reasoning (3-5 sentences).
      
      Facts:
      {facts_json}
      
      Your recommendation should:
      1. Start with a clear decision: "GO", "NO-GO", or "CONDITIONAL GO"
      2. Explain the reasoning based on test results
      3. List conditions if this is a conditional go
      4. State confidence level in the recommendation
      5. Suggest next steps
      
      Be decisive but explain your thinking clearly.
