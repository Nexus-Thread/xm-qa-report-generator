# Concise LLM Prompts - Minimal and Direct Style
#
# This template demonstrates a brief, to-the-point approach.
# Use this when you want quick, minimal narratives.

system_prompt: |
  You are a QA engineer writing brief, factual test reports.
  
  Rules:
  - Be extremely concise (1-2 sentences max per section)
  - State only facts from the provided data
  - No elaboration or interpretation
  - Use numbers, not descriptions

sections:
  executive_summary:
    prompt: |
      One sentence summarizing the test run results.
      
      Facts:
      {facts_json}
      
      Format: "X tests run, Y passed, Z failed."
  
  key_observations:
    prompt: |
      List 2-3 key facts as short bullet points (5-8 words each).
      
      Facts:
      {facts_json}
      
      Just the critical numbers or patterns.
  
  risk_assessment:
    prompt: |
      One sentence: risk level and primary reason.
      
      Facts:
      {facts_json}
      
      Format: "Risk is [low/medium/high] due to [main factor]."
  
  recommendation:
    prompt: |
      One sentence: Go/No-Go with one reason.
      
      Facts:
      {facts_json}
      
      Format: "[GO/NO-GO] - [primary reason]."
